name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/DecisionHelper.Web/package-lock.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build Tailwind CSS
        working-directory: src/DecisionHelper.Web
        run: |
          npm ci --no-audit --no-fund
          npm run build:css

      - name: Verify Tailwind output contains classes used in code
        working-directory: src/DecisionHelper.Web
        run: |
          css=wwwroot/dh-app.css
          size=$(wc -c < "$css")
          echo "dh-app.css size: $size bytes"
          if [ "$size" -lt 3000 ] || [ "$size" -gt 100000 ]; then
            echo "::error::dh-app.css size $size out of expected range (3 KB – 100 KB). Likely a Tailwind purge/config regression."
            exit 1
          fi
          required="bg-zinc-900 bg-zinc-50 text-white text-emerald-700 text-rose-700"
          for cls in $required; do
            if ! grep -q "\.$cls" "$css"; then
              echo "::error::dh-app.css is missing required class .$cls — buttons/styles will render invisibly in production."
              exit 1
            fi
          done

      - name: Restore .NET
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/test-results.trx'
          if-no-files-found: ignore
